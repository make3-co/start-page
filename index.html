<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Start Page</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-overlay"></div>

    <header>
        <div class="header-left">
            <div style="display: flex; align-items: center; gap: 20px;">
                <div class="clock" id="clock">00:00</div>
                <div class="weather" id="weather">
                    <i class="fas fa-cloud"></i>
                    <span>--°F</span>
                </div>
            </div>
            <div class="date-display" id="date-display">Monday, January 1</div>
        </div>

        <div class="search-container">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search google..." id="search-input">
            </div>
            <!-- Google Apps Launcher -->
            <div class="apps-launcher-container">
                <button id="apps-btn" class="apps-btn" title="Google Apps">
                    <i class="fas fa-th"></i>
                </button>
                <div id="apps-dropdown" class="apps-dropdown hidden">
                    <div class="apps-grid">
                        <!-- Apps injected by JS -->
                    </div>
                </div>
            </div>
        </div>

        <div class="settings-controls">
            <button id="google-signin-btn" title="Sign in with Google" class="hidden" onclick="window.location.href='/api/auth/login'">
                <i class="fab fa-google"></i>
            </button>
            
            <button id="edit-mode-btn" title="Toggle Edit Mode" class="hidden"><i class="fas fa-edit"></i></button>
            <button id="settings-btn" title="Settings"><i class="fas fa-cog"></i></button>
            <!-- Hidden Logout Button -->
            <button id="logout-btn" title="Logout" class="hidden"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <div id="grid-container" class="grid-container">
        <!-- Cards injected by JS -->
    </div>

    <!-- Add Group Modal -->
    <div id="add-group-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Add New Group</h3>
            <input type="text" id="new-group-name" placeholder="Group Name">
            <div class="modal-actions">
                <button id="cancel-add-group">Cancel</button>
                <button id="confirm-add-group" class="primary-btn">Add Group</button>
            </div>
        </div>
    </div>

    <!-- Edit Group Modal -->
    <div id="edit-group-modal" class="modal hidden">
        <div class="edit-group-panel">
            <div class="panel-header">
                <input type="text" id="edit-group-title" class="title-input" placeholder="Group Title">
                <div class="brand-row">
                    <label class="brand-toggle">
                        <input type="checkbox" id="edit-group-branded">
                        Branded
                    </label>
                    <input type="text" id="edit-group-brand-url" class="brand-url" placeholder="Brand domain (e.g. facebook.com)">
                </div>
            </div>
            <div class="panel-scroll">
                <div id="group-links-container"></div>
            </div>
            <div class="panel-footer">
                <div class="footer-left">
                    <button type="button" id="delete-group-full" class="btn btn-destructive">Delete</button>
                    <button type="button" id="move-group-btn" class="btn btn-secondary" title="Convert this group to a list inside another group">Move to…</button>
                </div>
                <div class="footer-center">
                    <button type="button" id="add-link-row-btn" class="btn btn-add"><i class="fas fa-plus"></i> Link</button>
                    <button type="button" id="add-list-btn" class="btn btn-add"><i class="fas fa-layer-group"></i> List</button>
                </div>
                <div class="footer-right">
                    <button type="button" id="cancel-group-edit" class="btn btn-cancel">Cancel</button>
                    <button type="button" id="save-group-edit" class="btn btn-primary">Save</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Move Group Modal -->
    <div id="move-group-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Move Group to...</h3>
            <p style="font-size: 0.9em; color: #666; margin-bottom: 15px;">Select a group to move "<span id="move-source-name"></span>" into. It will become a list.</p>
            <div id="move-target-list" style="max-height: 300px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px;">
                <!-- Target groups injected by JS -->
            </div>
            <div class="modal-actions" style="margin-top: 20px;">
                <button id="cancel-move-group">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal hidden">
        <div class="modal-content">
            <h3>Settings</h3>

            <!-- Auth Settings -->
            <h4 style="margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 5px;">Authentication</h4>
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-size: 0.9em; margin-bottom: 5px;">Allowed Emails (comma-separated)</label>
                <input type="text" id="settings-allowed-email" placeholder="your.email@gmail.com">
                <p style="font-size: 0.8em; color: #666; margin-top: 5px;">Server-side Google OAuth. Session lasts 7 days.</p>
                <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9em; margin-top: 10px;">
                    <input type="checkbox" id="settings-hide-loggedout" style="width: auto;">
                    Hide content when logged out (Sign-in button stays visible)
                </label>
            </div>
            
            <h4 style="border-bottom: 1px solid #eee; padding-bottom: 5px;">Google Apps</h4>
            <div id="google-apps-toggles" style="max-height: 200px; overflow-y: auto; margin-bottom: 20px; border: 1px solid #eee; padding: 10px; border-radius: 8px;">
                <!-- Checkboxes injected by JS -->
            </div>

            <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 5px; margin-bottom: 10px;">
                <h4 style="margin: 0; border: none; padding: 0;">JSON Data</h4>
                <button id="copy-json-btn" class="copy-btn">Copy JSON</button>
            </div>
            <p style="font-size: 0.8em; color: #666; margin-bottom: 10px;">Warning: editing JSON directly can break the app.</p>
            <textarea id="config-json" rows="10" style="font-family: monospace; font-size: 0.9em;"></textarea>
            
            <div class="modal-actions" style="justify-content: space-between;">
                <button id="reset-defaults" class="danger-btn">Reset Defaults</button>
                <div style="display:flex; gap:10px;">
                    <button id="close-settings">Close</button>
                    <button id="save-settings" class="primary-btn">Save</button>
                </div>
            </div>
        </div>
    </div>

    <script src="default_data.js"></script>
    <script src="script.js"></script>
</body>
</html>
